      </g>
      <!-- Repo: kodu-ai/claude-coder -->
      <g transform="translate(3300, 0)">
        <!-- Owner name -->
        <text x="140" y="102" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#ffffff" opacity="1.0">kodu-ai</text>
        <text x="246" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#00ffff"> | 5.3K ⭐ +1</text>
        <!-- Repo name -->
        <text x="140" y="132" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#ffffff">claude-coder</text>
      </g>
      <!-- Repo: guanshan/ClaudeCode -->
      <g transform="translate(3600, 0)">
        <!-- Repo name -->
        <text x="140" y="32" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#ffffff">ClaudeCode</text>
        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#ffffff" opacity="1.0">guanshan</text>
        <text x="258" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#00ffff"> | 55 ⭐ +1</text>
      </g>
      <!-- Repo: affaan-m/everything-claude-code -->
      <g transform="translate(3900, 0)">
        <!-- Owner name -->
        <text x="140" y="102" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#ffffff" opacity="1.0">affaan-m</text>
        <text x="258" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
