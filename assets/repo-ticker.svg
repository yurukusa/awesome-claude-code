              fill="#ffffff">claude-code-telegram</text>
        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#ffffff" opacity="1.0">RichardAtCT</text>
        <text x="294" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#00ffff"> | 2.3K ⭐ +13</text>
      </g>
      <!-- Repo: https-deeplearning-ai/sc-claude-code-files -->
      <g transform="translate(300, 0)">
