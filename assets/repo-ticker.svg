        <text x="246" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#00ffff"> | 3.9K ⭐ +14</text>
        <!-- Repo name -->
        <text x="140" y="132" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#ffffff">claude-code-guide</text>
      </g>
      <!-- Repo: lorryjovens-hub/claude-code-rust -->
      <g transform="translate(3000, 0)">
        <!-- Repo name -->
        <text x="140" y="32" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#ffffff">claude-code-rust</text>
        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#ffffff" opacity="1.0">lorryjovens-hub</text>
        <text x="342" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#00ffff"> | 1.2K ⭐ +34</text>
      </g>
      <!-- Repo: wshobson/agents -->
      <g transform="translate(3300, 0)">
        <!-- Owner name -->
        <text x="140" y="102" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#ffffff" opacity="1.0">wshobson</text>
        <text x="258" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#00ffff"> | 33.2K ⭐ +71</text>
        <!-- Repo name -->
        <text x="140" y="132" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#ffffff">agents</text>
      </g>
      <!-- Repo: carlvellotti/claude-code-pm-course -->
      <g transform="translate(3600, 0)">
        <!-- Repo name -->
        <text x="140" y="32" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#ffffff">claude-code-pm-course</text>
        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#ffffff" opacity="1.0">carlvellotti</text>
        <text x="306" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#00ffff"> | 1.8K ⭐ +19</text>
      </g>
      <!-- Repo: ponponon/claude_code_src -->
      <g transform="translate(3900, 0)">
        <!-- Owner name -->
        <text x="140" y="102" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#ffffff" opacity="1.0">ponponon</text>
        <text x="258" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#00ffff"> | 2.1K ⭐ +18</text>
        <!-- Repo name -->
        <text x="140" y="132" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#ffffff">claude_code_src</text>
      </g>
    </g>
  </g>

  <!-- Edge fade effects -->
  <rect x="130" y="0" width="50" height="100" fill="url(#leftFade)"/>
  <rect x="850" y="0" width="50" height="100" fill="url(#rightFade)"/>
</svg>