        <!-- Repo name -->
        <text x="140" y="132" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">claude-code-mastering</text>
      </g>
      <!-- Repo: snarktank/ralph -->
      <g transform="translate(3000, 0)">
        <!-- Repo name -->
        <text x="140" y="32" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">ralph</text>
        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">snarktank</text>
        <text x="270" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 14.1K ⭐ +87</text>
      </g>
      <!-- Repo: router-for-me/CLIProxyAPI -->
      <g transform="translate(3300, 0)">
        <!-- Owner name -->
        <text x="140" y="102" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">router-for-me</text>
        <text x="318" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 21.4K ⭐ +337</text>
        <!-- Repo name -->
        <text x="140" y="132" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">CLIProxyAPI</text>
      </g>
      <!-- Repo: affaan-m/everything-claude-code -->
      <g transform="translate(3600, 0)">
        <!-- Repo name -->
        <text x="140" y="32" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">everything-claude-code</text>
        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">affaan-m</text>
        <text x="258" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 120.2K ⭐ +3.5K</text>
      </g>
      <!-- Repo: steipete/claude-code-mcp -->
      <g transform="translate(3900, 0)">
        <!-- Owner name -->
        <text x="140" y="102" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">steipete</text>
        <text x="258" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 1.2K ⭐ +2</text>
        <!-- Repo name -->
