        <text x="246" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 5.3K ⭐ +1</text>
      </g>
      <!-- Repo: alirezarezvani/claude-code-tresor -->
      <g transform="translate(2100, 0)">
        <!-- Owner name -->
        <text x="140" y="102" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">alirezarezvani</text>
        <text x="330" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 658 ⭐ +1</text>
        <!-- Repo name -->
        <text x="140" y="132" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">claude-code-tresor</text>
      </g>
      <!-- Repo: ChrisWiles/claude-code-showcase -->
      <g transform="translate(2400, 0)">
        <!-- Repo name -->
        <text x="140" y="32" font-family="'Courier New', monospace" font-size="34" font-weight="bold"
              fill="#2d2d2d">claude-code-showcase</text>
        <!-- Owner name -->
        <text x="140" y="64" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">ChrisWiles</text>
        <text x="282" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 5.6K ⭐ +15</text>
      </g>
      <!-- Repo: revfactory/claude-code-mastering -->
      <g transform="translate(2700, 0)">
        <!-- Owner name -->
        <text x="140" y="102" font-family="'Courier New', monospace" font-size="24" font-weight="normal"
              fill="#2d2d2d" opacity="1.0">revfactory</text>
        <text x="282" y="102" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
