              fill="#2d2d2d" opacity="1.0">ChinaSiro</text>
        <text x="270" y="64" font-family="'Courier New', monospace" font-size="16" font-weight="bold"
              fill="#9C4EFF"> | 8.7K ⭐ +66</text>
      </g>
      <!-- Repo: anthropics/claude-code-security-review -->
